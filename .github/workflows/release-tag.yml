name: Release Tag

on: push

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: packscripts
        run: bun install --frozen-lockfile

      - name: Build all targets
        working-directory: packscripts
        run: |
          bun run build_win
          bun run build_nix
          bun run build_osx
          bun run build_arm

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            packscripts/packscripts-win.exe
            packscripts/packscripts-nix
            packscripts/packscripts-osx
            packscripts/packscripts-arm
          generate_release_notes: true
