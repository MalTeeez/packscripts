name: Release Tag

on: push

jobs:
  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows binary
        run: bun run build_win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packscripts-win
          path: ./packscripts-win.exe

  build-nix:
    name: Build Linux/macOS/ARM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build non-Windows binaries
        run: |
          bun run build_nix
          bun run build_osx
          bun run build_arm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packscripts-nix
          path: |
            ./packscripts-nix
            ./packscripts-osx
            ./packscripts-arm

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-win, build-nix]
    permissions:
      contents: write
    if: github.ref_type == 'tag'
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: packscripts-win

      - name: Download Linux/macOS/ARM artifacts
        uses: actions/download-artifact@v4
        with:
          name: packscripts-nix

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./packscripts-win.exe
            ./packscripts-nix
            ./packscripts-osx
            ./packscripts-arm
          generate_release_notes: true
